    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap');
        :root {
            --bg: #030305;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --panel: rgba(18, 18, 22, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
        }
        body { 
            margin: 0; 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main);
            overflow: hidden; 
        }
        
        .glass-panel {
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
        }

        .neo-button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .neo-button:hover {
            transform: translateY(-1px);
            filter: brightness(1.2);
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .neo-button:active { transform: scale(0.98); }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        .twinkle { animation: twinkle linear infinite; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
        }
    </style>
</head>

        const ZODIACO_NOMI = ["Ari", "Tau", "Gem", "Cnc", "Leo", "Vir", "Lib", "Sco", "Sgr", "Cap", "Aqr", "Psc"];

        function App() {
            const [tempovero, setTempovero] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [daysPerFrame, setDaysPerFrame] = useState(1);
            const [showInfo, setShowInfo] = useState(false);
            const canvasRef = useRef(null);
            const requestRef = useRef(null);

            const COLORS = {
                bg: '#0F0F11',
                sidebar: '#121214',
                header: '#161618',
                accent: '#6366f1',
                accentMuted: 'rgba(99, 102, 241, 0.1)',
                border: '#1e1e1e',
                text: '#d4d4d4',
                textMuted: '#737373',
                yellow: '#eab308',
                red: '#ef4444',
            };

            const STARS_EXTRA_DATA = useMemo(() => {
                return STARS_DATA.map(s => ({
                    ...s,
                    twinkleSpeed: 2 + Math.random() * 4,
                    twinkleOffset: Math.random() * Math.PI * 2
                }));
            }, []);

            const updateSim = useCallback((t) => {
                if (!canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;

                const W = canvas.width;
                const H = canvas.height;
                const realTimeSeconds = Date.now() / 1000;

                // Deep space background with subtle nebulosity
                ctx.fillStyle = '#030305';
                ctx.fillRect(0, 0, W, H);
                
                // Subtle nebula glow
                if (Number.isFinite(W) && Number.isFinite(H) && W > 0 && H > 0) {
                    const grad = ctx.createRadialGradient(W * 0.3, H * 0.4, 0, W * 0.3, H * 0.4, W * 0.6);
                    grad.addColorStop(0, 'rgba(99, 102, 241, 0.03)');
                    grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, W, H);
                }

                // Orbital constants
                const skyH = H * 0.35;
                const area_H = H - skyH;
                const base_unit = Math.min(W, area_H);
                const r_zodiac = base_unit * 0.44; 
                const r_orb_p = base_unit * 0.3978;
                const r_orb_t = (r_orb_p / (UA_PIANETA || 1.524)) * 1.2825; 

                // Astro-calculations (Mathematical CCW system: y is mathematical up)
                const ang_riv = (t % ANNO_TERRA_MIN) / ANNO_TERRA_MIN * (2 * Math.PI);
                const ang_pianeta = (t % ANNO_PIANETA_MIN) / ANNO_PIANETA_MIN * (2 * Math.PI) + (120 * Math.PI / 180);
                
                // Current Apparent Position Logic
                const current_ex = r_orb_t * Math.cos(ang_riv);
                const current_ey = r_orb_t * Math.sin(ang_riv);
                const current_px = r_orb_p * Math.cos(ang_pianeta);
                const current_py = r_orb_p * Math.sin(ang_pianeta);
                
                const current_ra = Math.atan2(current_py - current_ey, current_px - current_ex);
                
                // Centering the sky view on the "Midnight" observer direction (away from Sun)
                // This correctly simulates a night sky and prevents seeing the Sun at night.
                const sky_center_angle = ang_riv; 

                // --- Sky View ---
                // Projection: East (increasing RA) is to the LEFT, West is to the RIGHT.
                const skyRect = { x: 0, y: 0, w: W, h: skyH };
                const HORIZON_LIMIT = Math.PI / 2; // Full 180 degree night sky (horizon to horizon)
                
                ctx.save();
                ctx.beginPath();
                ctx.rect(skyRect.x, skyRect.y, skyRect.w, skyRect.h);
                ctx.clip();
                
                const skyGrad = ctx.createLinearGradient(0, 0, 0, skyH);
                skyGrad.addColorStop(0, '#010102');
                skyGrad.addColorStop(0.8, '#050510');
                skyGrad.addColorStop(1, '#0c0c1e');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(skyRect.x, skyRect.y, skyRect.w, skyRect.h);

                // Ground/Horizon Line
                ctx.strokeStyle = 'rgba(99, 102, 241, 0.2)';
                ctx.lineWidth = 1;
                ctx.beginPath(); 
                ctx.moveTo(skyRect.x, skyRect.y + skyRect.h); 
                ctx.lineTo(skyRect.x + skyRect.w, skyRect.y + skyRect.h); 
                ctx.stroke();

                // Darken bottom slightly to simulate horizon glow
                const horizonGrad = ctx.createLinearGradient(0, skyH * 0.7, 0, skyH);
                horizonGrad.addColorStop(0, 'rgba(0,0,0,0)');
                horizonGrad.addColorStop(1, 'rgba(15, 23, 42, 0.5)');
                ctx.fillStyle = horizonGrad;
                ctx.fillRect(skyRect.x, skyRect.y + skyRect.h * 0.7, skyRect.w, skyRect.h * 0.3);

                // HELPERS for Sky-to-Screen mapping
                const getSkyX = (obj_ra) => {
                    let diff = (sky_center_angle - obj_ra + Math.PI) % (2 * Math.PI);
                    if (diff < 0) diff += 2 * Math.PI;
                    diff -= Math.PI;
                    // Note: We use Math.abs(diff) < HORIZON_LIMIT to show only visible 180deg hemisphere
                    if (Math.abs(diff) > HORIZON_LIMIT) return null;
                    return skyRect.x + skyRect.w / 2 + diff * (skyRect.w / (2 * HORIZON_LIMIT));
                };

                // Compass Labels
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.font = '900 10px JetBrains Mono';
                ctx.textAlign = 'center';
                ctx.fillText("EST", skyRect.w * 0.05, skyH - 15);
                ctx.fillText("OVEST", skyRect.w * 0.95, skyH - 15);
                ctx.fillText("SUD (MEZZANOTTE)", skyRect.w * 0.5, skyH - 15);
                
                // Stars
                ctx.save();
                STARS_EXTRA_DATA.forEach(s => {
                    if (s.m < 0) return; 
                    const s_ra = (s.r * 15 * Math.PI / 180);
                    const sx = getSkyX(s_ra);
                    if (sx !== null) {
                        const sy = skyRect.y + skyRect.h / 2 - s.d * 2.5;
                        const twinkle = 0.6 + 0.4 * Math.sin(realTimeSeconds * s.twinkleSpeed + s.twinkleOffset);
                        const size = Math.max(0.6, (2.2 - s.m * 0.5) * twinkle);
                        ctx.globalAlpha = twinkle;
                        ctx.fillStyle = s.m < 1.0 ? '#fff' : '#cbd5e1';
                        ctx.beginPath(); ctx.arc(sx, sy, size, 0, Math.PI * 2); ctx.fill();
                    }
                });
                ctx.restore();

                // Zodiac
                ZODIACO_NOMI.forEach((name, i) => {
                    const ra_rad = i * (Math.PI / 6); 
                    const sx = getSkyX(ra_rad);
                    if (sx !== null) {
                        const dec = 12 * Math.sin(ra_rad);
                        const sy = skyRect.y + skyRect.h / 2 - dec * 1.5;
                        ctx.fillStyle = 'rgba(99, 102, 241, 0.4)';
                        ctx.font = '700 11px JetBrains Mono';
                        ctx.textAlign = 'center';
                        ctx.fillText(name.toUpperCase(), sx, sy + (dec > 0 ? 30 : -20));
                    }
                });

                // The SUN in the Sky View
                const sun_ra = Math.atan2(0 - (current_ey || 0), 0 - (current_ex || 0));
                const sun_sx = getSkyX(sun_ra);
                if (sun_sx !== null && Number.isFinite(sun_sx)) {
                    const sun_sy = skyRect.y + skyRect.h / 2 - (12 * Math.sin(sun_ra)) * 1.5;
                    if (Number.isFinite(sun_sy)) {
                        const sunG = ctx.createRadialGradient(sun_sx, sun_sy, 0, sun_sx, sun_sy, 40);
                        sunG.addColorStop(0, 'rgba(253, 224, 71, 0.4)');
                        sunG.addColorStop(1, 'rgba(253, 224, 71, 0)');
                        ctx.fillStyle = sunG;
                        ctx.beginPath(); ctx.arc(sun_sx, sun_sy, 40, 0, Math.PI * 2); ctx.fill();
                        ctx.fillStyle = '#fde047';
                        ctx.beginPath(); ctx.arc(sun_sx, sun_sy, 8, 0, Math.PI * 2); ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.font = '800 10px Space Grotesk';
                        ctx.fillText("SOLE", sun_sx, sun_sy + 22);
                    }
                }

                // Planet Retrograde Trace (Apparent movement relative to stars)
                const tracePoints = [];
                const TRACE_STEPS = 300;
                for (let i = TRACE_STEPS; i >= 1; i--) { 
                    const t_p = t - (i * GIORNO_MINUTI * 0.7); // 210 days of history
                    const a_p = (t_p % ANNO_TERRA_MIN) / ANNO_TERRA_MIN * (2 * Math.PI);
                    const b_p = (t_p % ANNO_PIANETA_MIN) / ANNO_PIANETA_MIN * (2 * Math.PI) + (120 * Math.PI / 180);
                    
                    const ex_p = r_orb_t * Math.cos(a_p);
                    const ey_p = r_orb_t * Math.sin(a_p);
                    const px_p = r_orb_p * Math.cos(b_p);
                    const py_p = r_orb_p * Math.sin(b_p);
                    
                    const ra_p = Math.atan2(py_p - ey_p, px_p - ex_p);
                    const psx = getSkyX(ra_p);
                    if (psx !== null) {
                        const psy = skyRect.y + skyRect.h / 2 - (15 * Math.sin(ra_p)) * 1.5;
                        tracePoints.push({x: psx, y: psy, alpha: 1.0 - (i / TRACE_STEPS)});
                    }
                }
                
                if (tracePoints.length > 0) {
                    ctx.save();
                    // Add dots to imply direction/time
                    tracePoints.forEach((p, idx) => {
                        // More frequent dots for a cleaner "trail" look without the line
                        if (idx % 6 === 0) {
                            ctx.globalAlpha = p.alpha * 0.7;
                            ctx.fillStyle = '#ef4444';
                            ctx.beginPath(); ctx.arc(p.x, p.y, 1.8, 0, Math.PI * 2); ctx.fill();
                        }
                    });
                    ctx.restore();
                }

                // Current Planet perspective
                const psx = getSkyX(current_ra);
                if (psx !== null) {
                    const psy = skyRect.y + skyRect.h / 2 - (15 * Math.sin(current_ra)) * 1.5;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#ef4444';
                    ctx.fillStyle = '#ef4444';
                    ctx.beginPath(); ctx.arc(psx, psy, 6, 0, Math.PI * 2); ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.font = '900 8px Space Grotesk';
                    ctx.textAlign = 'center';
                    ctx.fillText("PIANETA", psx, psy - 18);
                }
                
                ctx.restore();


                // --- Orbital View ---
                const mx = W / 2;
                const my = skyH + (H - skyH) / 2;

                // Subtle grid in orbit view
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
                ctx.lineWidth = 1;
                for(let i=0; i<W; i+=100) { ctx.beginPath(); ctx.moveTo(i, skyH); ctx.lineTo(i, H); ctx.stroke(); }
                for(let i=skyH; i<H; i+=100) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke(); }

                // Orbits
                ctx.setLineDash([4, 6]);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(mx, my, r_orb_t, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.arc(mx, my, r_orb_p, 0, Math.PI * 2); ctx.stroke();
                ctx.setLineDash([]);
                
                // Zodiac Circle
                ctx.strokeStyle = 'rgba(99, 102, 241, 0.1)';
                ctx.beginPath(); ctx.arc(mx, my, r_zodiac, 0, Math.PI * 2); ctx.stroke();

                ZODIACO_NOMI.forEach((name, i) => {
                    const angle = i * (Math.PI / 6);
                    ctx.font = '800 11px JetBrains Mono';
                    ctx.fillStyle = 'rgba(99, 102, 241, 0.4)';
                    ctx.textAlign = 'center';
                    const lx = mx + (r_zodiac + 18) * Math.cos(angle + Math.PI/12);
                    const ly = my - (r_zodiac + 18) * Math.sin(angle + Math.PI/12);
                    
                    ctx.save();
                    ctx.translate(lx, ly);
                    ctx.rotate(-(angle + Math.PI/12 + Math.PI/2));
                    ctx.fillText(name.toUpperCase(), 0, 0);
                    ctx.restore();
                    
                    ctx.strokeStyle = 'rgba(99, 102, 241, 0.2)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(mx + r_zodiac * Math.cos(angle), my - r_zodiac * Math.sin(angle));
                    ctx.lineTo(mx + (r_zodiac+10) * Math.cos(angle), my - (r_zodiac+10) * Math.sin(angle));
                    ctx.stroke();
                });

                // Sun
                if (Number.isFinite(mx) && Number.isFinite(my)) {
                    const sunG_orb = ctx.createRadialGradient(mx, my, 0, mx, my, 25);
                    sunG_orb.addColorStop(0, '#fef9c3');
                    sunG_orb.addColorStop(0.2, '#fde047');
                    sunG_orb.addColorStop(1, 'rgba(253, 224, 71, 0)');
                    ctx.fillStyle = sunG_orb;
                    ctx.beginPath(); ctx.arc(mx, my, 25, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#fbbf24';
                    ctx.beginPath(); ctx.arc(mx, my, 7, 0, Math.PI * 2); ctx.fill();
                }

                // Position Calculations (Canvas Y = center - MathY)
                const ex = mx + r_orb_t * Math.cos(ang_riv);
                const ey = my - r_orb_t * Math.sin(ang_riv);
                const px = mx + r_orb_p * Math.cos(ang_pianeta);
                const py = my - r_orb_p * Math.sin(ang_pianeta);

                // Observer on Earth (Midnight position pointing AWAY from Sun)
                const obs_r = 6.5;
                const obs_x = ex + obs_r * Math.cos(ang_riv);
                const obs_y = ey - obs_r * Math.sin(ang_riv);

                // Sightline (Observer Perspective)
                const dist_op = Math.sqrt((px - obs_x) ** 2 + (py - obs_y) ** 2);
                const target_r = r_zodiac * 1.5;
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(obs_x, obs_y);
                ctx.lineTo(obs_x + (px - obs_x) * (target_r / dist_op), obs_y + (py - obs_y) * (target_r / dist_op));
                ctx.stroke();
                ctx.setLineDash([]);

                // Earth
                ctx.save();
                ctx.translate(ex, ey);
                ctx.rotate(-ang_riv); // Align with Sun vector
                
                // Shadow (side away from sun)
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.beginPath(); ctx.arc(0, 0, 7, -Math.PI/2, Math.PI/2); ctx.fill();
                
                // Earth body
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#3b82f6';
                ctx.fillStyle = '#3b82f6';
                ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(0, 0, 6.5, 0, Math.PI * 2); ctx.stroke();
                
                // Observer on Earth (Midnight position pointing AWAY from Sun)
                ctx.fillStyle = '#ef4444';
                ctx.beginPath(); ctx.arc(6.5, 0, 2.5, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
                
                // Earth label badge
                drawLabel(ctx, "TERRA", ex, ey + 20, '#3b82f6');


                // PIANETA
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ef4444';
                ctx.fillStyle = '#ef4444';
                ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI * 2); ctx.stroke();
                drawLabel(ctx, "PIANETA", px, py + 20, '#ef4444');

            }, [STARS_EXTRA_DATA]);

            function drawLabel(ctx, text, x, y, color) {
                ctx.font = '800 8px Space Grotesk';
                const tw = ctx.measureText(text).width;
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                // Fallback for roundRect if needed
                if (ctx.roundRect) {
                    ctx.beginPath();
                    ctx.roundRect(x - tw/2 - 6, y - 8, tw + 12, 14, 4);
                    ctx.fill();
                } else {
                    ctx.fillRect(x - tw/2 - 6, y - 8, tw + 12, 14);
                }
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.fillText(text, x, y + 2);
            }
        
            useEffect(() => {
                const handleKeyDown = (e) => {
                    const key = e.key.toLowerCase();
                    if (key === 'g') setTempovero(p => p + GIORNO_MINUTI);
                    else if (key === 'm') setTempovero(p => p + 30 * GIORNO_MINUTI);
                    else if (key === 'a') setTempovero(p => p + 365 * GIORNO_MINUTI);
                    else if (key === ' ') setIsPlaying(p => !p);
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            useEffect(() => {
                const handleResize = () => {
                    if (canvasRef.current) {
                        const parent = canvasRef.current.parentElement;
                        canvasRef.current.width = parent.clientWidth;
                        canvasRef.current.height = parent.clientHeight;
                        updateSim(tempovero);
                    }
                };
                window.addEventListener('resize', handleResize);
                handleResize();
                return () => window.removeEventListener('resize', handleResize);
            }, [tempovero, updateSim]);

            useEffect(() => {
                let lastTime = 0;
                const animate = (time) => {
                    if (lastTime !== 0 && isPlaying) {
                        setTempovero(p => p + (daysPerFrame * GIORNO_MINUTI / 4)); // Div 4 for smoother 60fps
                    }
                    lastTime = time;
                    updateSim(tempovero);
                    requestRef.current = requestAnimationFrame(animate);
                };
                requestRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(requestRef.current);
            }, [isPlaying, daysPerFrame, updateSim, tempovero]);

            const timeInfo = useMemo(() => {
                const cur_anni = Math.floor(tempovero / ANNO_TERRA_MIN);
                const resto = tempovero % ANNO_TERRA_MIN;
                const cur_mesi = Math.floor(resto / (30 * GIORNO_MINUTI));
                const cur_giorni = Math.floor((resto % (30 * GIORNO_MINUTI)) / GIORNO_MINUTI);
                return { cur_anni, cur_mesi, cur_giorni };
            }, [tempovero]);

            return (
                <div className="flex flex-col h-screen w-full bg-[#030305] text-slate-300 font-sans overflow-hidden">
                    <nav className="h-10 glass-panel flex items-center justify-between px-6 z-30 shadow-2xl">
                        <div className="flex items-center gap-3">
                            <div className="w-6 h-6 bg-indigo-600 rounded flex items-center justify-center font-bold text-white text-[10px] shadow-[0_0_15px_rgba(99,102,241,0.5)]">AI</div>
                            <span className="font-bold tracking-[0.2em] text-white uppercase text-[13px] opacity-90">Andrea Cristofori - Il Moto Retrogrado dei Pianeti</span>
                        </div>
                        <div className="flex items-center gap-6">
                            <Metric value={timeInfo.cur_anni} label="Anni" />
                            <Metric value={timeInfo.cur_mesi} label="Mesi" />
                            <Metric value={timeInfo.cur_giorni} label="Giorni" />
                        </div>
                    </nav>

                    <div className="flex flex-1 overflow-hidden relative">
                        <aside className="w-56 glass-panel flex flex-col z-30 m-4 rounded-2xl p-6 space-y-8">
                            <div className="space-y-4">
                                <label className="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-400 block pb-2 border-b border-white/5">Controlli Sistema</label>
                                
                                <ControlGroup label="Riproduzione">
                                    <button onClick={() => setIsPlaying(!isPlaying)} className={`w-full py-3 neo-button ${isPlaying ? 'bg-rose-500/10 text-rose-500 border-rose-500/20' : 'bg-indigo-600 text-white'} border rounded-xl text-[11px] font-black uppercase tracking-widest flex items-center justify-center gap-2`}>
                                        <Icon name={isPlaying ? Pause : Play} size={14} />
                                        {isPlaying ? 'Pausa' : 'Avvia animazione'}
                                    </button>
                                </ControlGroup>

                                <ControlGroup label="Velocità">
                                    <div className="flex justify-between text-[10px] font-mono text-slate-500 mb-2">
                                        <span>Lineare</span>
                                        <span className="text-indigo-400">{daysPerFrame}x</span>
                                    </div>
                                    <input type="range" min="0.1" max="5" step="0.1" value={daysPerFrame} onChange={(e) => setDaysPerFrame(parseFloat(e.target.value))} />
                                </ControlGroup>
                            </div>

                            <div className="space-y-4">
                                <label className="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-400 block pb-2 border-b border-white/5">Spostamento Orbitale</label>
                                <div className="grid grid-cols-1 gap-2">
                                    <StepButton onClick={() => setTempovero(p => p + GIORNO_MINUTI)} label="+1 Giorno" />
                                    <div className="grid grid-cols-2 gap-2">
                                        <StepButton onClick={() => setTempovero(p => p + 30 * GIORNO_MINUTI)} label="+ 1 Mese" />
                                        <StepButton onClick={() => setTempovero(p => p + 365 * GIORNO_MINUTI)} label="+ 1 Anno" />
                                    </div>
                                </div>
                            </div>

                            <div className="flex-1" />

                            <div className="space-y-3">
                                <button onClick={() => setTempovero(0)} className="neo-button w-full py-2 bg-blue-500/5 hover:bg-blue-500/10 text-blue-400 border border-blue-400/50 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2">
                                    <Icon name={RotateCcw} size={14} />
                                    Reset
                                </button>
                            </div>
                        </aside>

                        <main className="flex-1 relative overflow-hidden">
                            <canvas ref={canvasRef} className="absolute inset-0" />
                            
                            {/* HUD Elements */}
                            <div className="absolute top-4 right-4 z-40 pointer-events-none text-right">

                                <div className="text-[8px] text-slate-500 font-mono">ORBITA STABILE RILEVATA</div>
                            </div>

                            <div className="absolute bottom-6 right-6 z-40 flex items-center gap-4">
                                <LegendItem color="bg-yellow-400" label="SOLE" />
                                <LegendItem color="bg-blue-500" label="TERRA" />
                                <LegendItem color="bg-rose-500" label="PIANETA" />
                            </div>

                            <div className="absolute top-6 left-6 z-40 pointer-events-none">
                                <div className="glass-panel px-4 py-2 rounded border-l-2 border-indigo-500">
                                    <div className="text-[11px] font-black text-white uppercase tracking-[0.2em]">Proiezione Celeste</div>

                                </div>
                            </div>

                            <div className="absolute bottom-6 left-6 z-40 pointer-events-none">
                                <div className="glass-panel px-4 py-2 rounded border-l-2 border-slate-700">
                                    <div className="text-[11px] font-black text-white uppercase tracking-[0.2em]">Schema Orbitale</div>
                                </div>
                            </div>
                        </main>
                    </div>

                    <AnimatePresence>
                        {showInfo && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-md" onClick={() => setShowInfo(false)}>
                                <motion.div initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} exit={{ y: 20, opacity: 0 }} className="max-w-xl w-full glass-panel p-10 rounded-[2rem] relative bg-[#0a0a0f] shadow-[0_0_50px_rgba(0,0,0,0.5)]" onClick={e => e.stopPropagation()}>
                                    <div className="absolute top-10 right-10 cursor-pointer text-slate-500 hover:text-white" onClick={() => setShowInfo(false)}>
                                        <Icon name={ChevronDown} size={24} />
                                    </div>
                                    <h2 className="text-3xl font-black text-white mb-6 uppercase tracking-tighter">Observatory Notes</h2>
                                    <div className="space-y-6 text-slate-400 leading-relaxed text-sm">
                                        <p>
                                            The <span className="text-white font-bold">Retrograde Motion</span> is an apparent change in movement of an object through the sky. It is not real, in that the planet does not physically start moving backwards in its orbit.
                                        </p>
                                        <p className="p-4 bg-white/5 rounded-xl border border-white/5 font-mono text-xs">
                                            Simulation synced to Earth sidereal day. Step coefficient: 1.0. Orbital resonance calibrated for PIANETA/Earth overlap.
                                        </p>
                                        <p>
                                            In this model, we freeze the observation at exactly the same time each day. This removes the dizzying effects of Earth's rotation, revealing the elegant geometric dance of our planetary neighbors.
                                        </p>
                                    </div>
                                    <button onClick={() => setShowInfo(false)} className="w-full mt-10 py-4 bg-indigo-600 neo-button text-white font-black uppercase tracking-widest rounded-2xl text-[12px]">Return to Console</button>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
